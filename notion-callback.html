<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ARIA - Connecting Notion...</title>
<style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8f9fb; margin: 0; }
    .card { text-align: center; padding: 40px; max-width: 400px; }
    h2 { font-size: 20px; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 14px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #0096FF; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #dc2626; background: #fee2e2; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 13px; }
</style>
</head>
<body>
<div class="card">
    <div class="spinner" id="spinner"></div>
    <h2>Connecting Notion...</h2>
    <p id="status">Redirecting back to ARIA...</p>
    <div id="error" class="error" style="display:none;"></div>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const state = params.get('state');
    const port = state ? state.split('_')[0] : '8642';
    const localCallback = `http://localhost:${port}/oauth/notion/complete`;

    if (error) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'Authorization cancelled.';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = `Notion error: ${error}`;
        setTimeout(() => { window.location.href = `http://localhost:${port}/`; }, 3000);
    } else if (code) {
        document.getElementById('status').textContent = 'Completing connection...';
        window.location.href = `${localCallback}?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state || '')}`;
    } else {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'Something went wrong.';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'No authorization code received from Notion.';
    }
</script>
</body>
</html>
